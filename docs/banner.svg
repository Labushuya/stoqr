<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE3D6"/>
      <stop offset="100%" stop-color="#E0D4BC"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A5A42"/>
      <stop offset="100%" stop-color="#3A3A28"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2C1F14" flood-opacity="0.18"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#2C1F14" flood-opacity="0.12"/>
    </filter>
    <clipPath id="boxClip">
      <rect x="0" y="0" width="96" height="96" rx="18" ry="18"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bgGrad)"/>

  <!-- Left accent stripe -->
  <rect x="0" y="0" width="6" height="320" fill="#C4673A"/>

  <!-- Subtle grain texture overlay -->
  <rect width="1280" height="320" fill="none" opacity="0.03"/>

  <!-- Logo box -->
  <g transform="translate(72, 112)" filter="url(#shadow)">
    <rect width="96" height="96" rx="18" ry="18" fill="url(#boxGrad)"/>
    <!-- Tag notch top-right corner -->
    <polygon points="78,0 96,0 96,18" fill="#C4673A" opacity="0.9"/>
    <!-- S letterform — custom path for optical weight -->
    <text x="48" y="67" font-family="Georgia, serif" font-size="62" font-weight="700"
          text-anchor="middle" fill="#F5F0E8" letter-spacing="-2">S</text>
  </g>

  <!-- Wordmark: stoqr -->
  <text x="200" y="178"
        font-family="'Trebuchet MS', 'Segoe UI', Arial, sans-serif"
        font-size="88" font-weight="700" letter-spacing="-4"
        fill="#2C1F14" filter="url(#textShadow)">sto</text>
  <!-- q in primary color for visual anchor -->
  <text x="430" y="178"
        font-family="'Trebuchet MS', 'Segoe UI', Arial, sans-serif"
        font-size="88" font-weight="700" letter-spacing="-4"
        fill="#C4673A">q</text>
  <text x="492" y="178"
        font-family="'Trebuchet MS', 'Segoe UI', Arial, sans-serif"
        font-size="88" font-weight="700" letter-spacing="-4"
        fill="#2C1F14">r</text>

  <!-- Tagline -->
  <text x="200" y="218"
        font-family="'Trebuchet MS', 'Segoe UI', Arial, sans-serif"
        font-size="20" font-weight="400" letter-spacing="1"
        fill="#6B5744">Self-hosted food inventory · MHD tracking · Bring! integration</text>

  <!-- Decorative separator line -->
  <line x1="200" y1="232" x2="620" y2="232" stroke="#D4C8B0" stroke-width="1.5" opacity="0.8"/>

  <!-- Stack pills -->
  <g transform="translate(200, 252)">
    <!-- SvelteKit pill -->
    <rect x="0" y="0" width="86" height="26" rx="13" fill="#4A4A35" opacity="0.9"/>
    <text x="43" y="17" font-family="'Trebuchet MS', Arial, sans-serif" font-size="11"
          font-weight="600" text-anchor="middle" fill="#E8DCC8" letter-spacing="0.5">SvelteKit</text>

    <!-- PostgreSQL pill -->
    <rect x="94" y="0" width="90" height="26" rx="13" fill="#4A4A35" opacity="0.9"/>
    <text x="139" y="17" font-family="'Trebuchet MS', Arial, sans-serif" font-size="11"
          font-weight="600" text-anchor="middle" fill="#E8DCC8" letter-spacing="0.5">PostgreSQL</text>

    <!-- Docker pill -->
    <rect x="192" y="0" width="68" height="26" rx="13" fill="#C4673A" opacity="0.9"/>
    <text x="226" y="17" font-family="'Trebuchet MS', Arial, sans-serif" font-size="11"
          font-weight="600" text-anchor="middle" fill="#F5F0E8" letter-spacing="0.5">Docker</text>

    <!-- Raspberry Pi pill -->
    <rect x="268" y="0" width="104" height="26" rx="13" fill="#7A9E7E" opacity="0.9"/>
    <text x="320" y="17" font-family="'Trebuchet MS', Arial, sans-serif" font-size="11"
          font-weight="600" text-anchor="middle" fill="#F5F0E8" letter-spacing="0.5">Raspberry Pi</text>

    <!-- AGPL pill -->
    <rect x="380" y="0" width="62" height="26" rx="13" fill="#4A4A35" opacity="0.6"/>
    <text x="411" y="17" font-family="'Trebuchet MS', Arial, sans-serif" font-size="11"
          font-weight="600" text-anchor="middle" fill="#E8DCC8" letter-spacing="0.5">AGPL-3.0</text>
  </g>

  <!-- Right side decorative element: storage icon suggestion -->
  <g transform="translate(1050, 80)" opacity="0.12">
    <rect x="0" y="0" width="160" height="160" rx="24" fill="#4A4A35"/>
    <rect x="16" y="16" width="128" height="128" rx="16" fill="none" stroke="#4A4A35" stroke-width="3"/>
    <rect x="32" y="52" width="96" height="22" rx="6" fill="#4A4A35"/>
    <rect x="32" y="84" width="96" height="22" rx="6" fill="#4A4A35"/>
    <rect x="32" y="116" width="96" height="22" rx="6" fill="#4A4A35"/>
  </g>
</svg>
