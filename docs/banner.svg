<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE3D6"/>
      <stop offset="100%" stop-color="#DDD0B8"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A5A42"/>
      <stop offset="100%" stop-color="#3A3A28"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#2C1F14" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Left accent stripe -->
  <rect x="0" y="0" width="6" height="320" fill="#C4673A"/>

  <!-- Logo box -->
  <g transform="translate(60, 100)" filter="url(#shadow)">
    <rect x="0" y="0" width="120" height="120" rx="22" fill="url(#box)"/>
    <!-- Terracotta price-tag notch -->
    <polygon points="90,0 120,0 120,30" fill="#C4673A"/>
    <!-- S glyph -->
    <text x="60" y="86"
          font-family="Georgia, serif"
          font-size="76" font-weight="700"
          text-anchor="middle"
          fill="#F5F0E8">S</text>
  </g>

  <!-- Wordmark — one text node, tspan only for colour on q -->
  <text x="210" y="202"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="104" font-weight="700"
        letter-spacing="-2"
        fill="#2C1F14"
        filter="url(#shadow)">sto<tspan fill="#C4673A">q</tspan>r</text>

  <!-- Tagline -->
  <text x="212" y="244"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="20" font-weight="400"
        letter-spacing="0.4"
        fill="#6B5744">Self-hosted food inventory · MHD tracking · Bring! integration</text>

  <!-- Thin separator -->
  <line x1="212" y1="262" x2="780" y2="262" stroke="#C4B89A" stroke-width="1" opacity="0.6"/>

  <!-- Claim line -->
  <text x="212" y="285"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-weight="400"
        letter-spacing="0.2"
        fill="#9C876E">Weißt du, was im Kühlschrank ist? Stoqr weiß es.</text>

  <!-- Right decorative shelf (subtle) -->
  <g transform="translate(970, 40)" opacity="0.09" fill="#4A4A35">
    <rect x="0" y="0" width="256" height="236" rx="18"/>
    <rect x="12" y="12" width="232" height="212" rx="10" fill="#EDE3D6"/>
    <rect x="12" y="12"  width="232" height="2" fill="#4A4A35"/>
    <rect x="12" y="78"  width="232" height="2" fill="#4A4A35"/>
    <rect x="12" y="144" width="232" height="2" fill="#4A4A35"/>
    <rect x="12" y="210" width="232" height="2" fill="#4A4A35"/>
    <!-- Row 1 items -->
    <rect x="22"  y="18" width="40" height="54" rx="6" fill="#C4673A" opacity="0.55"/>
    <rect x="70"  y="26" width="30" height="46" rx="6" fill="#7A9E7E" opacity="0.55"/>
    <rect x="108" y="20" width="46" height="52" rx="6" fill="#4A4A35" opacity="0.45"/>
    <rect x="162" y="24" width="34" height="48" rx="6" fill="#C4673A" opacity="0.40"/>
    <!-- Row 2 items -->
    <rect x="22"  y="84" width="30" height="52" rx="6" fill="#7A9E7E" opacity="0.55"/>
    <rect x="60"  y="90" width="46" height="46" rx="6" fill="#C4673A" opacity="0.50"/>
    <rect x="114" y="84" width="34" height="52" rx="6" fill="#4A4A35" opacity="0.40"/>
    <rect x="156" y="88" width="38" height="48" rx="6" fill="#7A9E7E" opacity="0.45"/>
    <!-- Row 3 items -->
    <rect x="22"  y="150" width="52" height="52" rx="6" fill="#4A4A35" opacity="0.40"/>
    <rect x="82"  y="156" width="36" height="46" rx="6" fill="#C4673A" opacity="0.50"/>
    <rect x="126" y="150" width="30" height="52" rx="6" fill="#7A9E7E" opacity="0.45"/>
    <rect x="164" y="154" width="42" height="48" rx="6" fill="#4A4A35" opacity="0.38"/>
  </g>
</svg>
