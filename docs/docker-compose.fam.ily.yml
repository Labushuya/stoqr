# stoqr — docker-compose.yml für fam.ily-Ökosystem
# Pfad auf dem Pi: /srv/hubdata/stacks/stoqr/docker-compose.yml
#
# Voraussetzungen:
#   - Externes Docker-Netzwerk "proxy" existiert
#   - Traefik läuft und überwacht dieses Netzwerk
#   - Pi-hole DNS: stoqr.fam.ily → Pi-IP
#   - Secrets liegen in: /srv/hubdata/state/stoqr/.env
#
# Verzeichnisstruktur:
#   /srv/hubdata/stacks/stoqr/
#     └── docker-compose.yml      ← diese Datei
#   /srv/hubdata/state/stoqr/
#     ├── .env                    ← Secrets (nie ins Repo)
#     └── postgres/               ← PostgreSQL Datenvolume
#
# Optionaler Symlink (nur zur Bequemlichkeit, nicht zwingend):
#   ln -s /srv/hubdata/state/stoqr/.env /srv/hubdata/stacks/stoqr/.env

services:

  # ── Stoqr App ───────────────────────────────────────────────────────────────
  stoqr:
    image: ghcr.io/labushuya/stoqr:main
    restart: unless-stopped
    env_file: /srv/hubdata/state/stoqr/.env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.stoqr.rule=Host(`stoqr.fam.ily`)"
      - "traefik.http.routers.stoqr.entrypoints=websecure"
      # Kein certresolver — lokales TLS vom bestehenden Traefik
      - "traefik.http.routers.stoqr.tls=true"
      - "traefik.http.services.stoqr.loadbalancer.server.port=3000"
      # HTTP→HTTPS-Redirect falls nicht Traefik-global aktiv:
      # - "traefik.http.routers.stoqr.middlewares=redirect-to-https@docker"
    networks:
      - proxy
      - internal

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: /srv/hubdata/state/stoqr/.env
    volumes:
      - /srv/hubdata/state/stoqr/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stoqr -d stoqr"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - internal

networks:
  proxy:
    external: true
  internal:
    internal: true
